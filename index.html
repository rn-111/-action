
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Runner - Theme Image Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #333; border-bottom: 4px solid #fff; display: block; margin-top: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; }
        .ui-panel { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.7); border-radius: 8px; text-align: center; min-width: 600px; border: 1px solid #444; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #0af; z-index: 10; min-width: 300px; }
        input { padding: 12px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; width: 80%; }
        button { padding: 12px 24px; font-size: 18px; background: #0af; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0088cc; transform: scale(1.05); }
        .ranking { margin-top: 20px; font-size: 14px; text-align: left; border-top: 1px solid #555; padding-top: 10px; }
        .ranking h3 { margin: 0 0 10px 0; color: #0af; }
        #rankingList div { margin-bottom: 5px; color: #ddd; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 id="menuTitle">THEME RUNNER</h1>
        <p id="menuMsg">名前を入力してスタート！</p>
        <input type="text" id="playerName" placeholder="名前を入力" maxlength="10"><br>
        <button onclick="startGame()">GAME START</button>
        <div class="ranking">
            <h3>Top 5 Rankings</h3>
            <div id="rankingList"></div>
        </div>
    </div>

    <div class="ui-panel">
        <span id="displayLabel" style="color:#0af; font-weight:bold;">PLAYER: ---</span> | 
        STAGE: <span id="stage">1</span> (<span id="themeName">自然</span>) | 
        SCORE: <span id="score">0</span>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    <p style="color:#888;">【Spaceキー】 または 【画面クリック】 でジャンプ！</p>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const menuTitle = document.getElementById("menuTitle");
const playerNameInput = document.getElementById("playerName");
const rankingList = document.getElementById("rankingList");

canvas.width = 800;
canvas.height = 350;

// --- プレイヤー画像（固定） ---
const imgPlayer = new Image();
imgPlayer.src = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiRuu0RWoeHs26-kJWDLyILcJZ9OljBuc_LyatexrDqGsYOBKNqKJWrt_jKhFATb1jmj124nhh4vTprkPzcRYemzFuSxbCR9cGFomOZx-vnOwQ5a16_4TmbjRWUolmtkNHg_d_5h-BtyvoTMJCvJ6ZmiiiSyu_0RfsbAStBrMaoUm8HN6NFJHIi-Lv8f0hh/s790/bird_fukurou_run.png";

// --- テーマごとの設定（画像を含む） ---
const themes = [
    { 
        name: "自然", 
        ground: "#2d5a27",
        bgSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj9nSlEdzOidnQt0USF9t7eH1RAUmOb-XUVRNhRl2uVQsyv_ApsFy9RyUhQAUFm9C-Atd_1jMZmzrdUraTh-HKrE09sQxj_yc4xBo48KIioEK3CvJGFOcRXkTbNswoGozKQwfdr4u4CC3nb/s600/bg_natural_mori.jpg", 
        obsSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiS2GlvLg0cLpUQNIcxW75eAVMOlRalWqk-92ZBxEDLgrx0XwJ4T4FMIi7mgRa41JVMKAbajqGo4yYqVfPk6vzUun1lIhbr9k9r8CociJ7ClRzUZw7vyD69HU2b8eq9RK5AhooNpOICKCHR/s800/tree_shirakaba.png" 
    },
    { 
        name: "都会", 
        ground: "#7f8c8d",
        bgSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjDCKwjioUdGQ6i-1MP6Oj5nQAW6e3g5dYy5ntfwFT91hvTlf1652B1-jg8_y_L3ebMrH1FKP5BY6tJCmR6dbYDZKLxEMQvKgkcAXqs1WLBe62eFof-0E9EXALV3Xr97Y0KdY1FvdZIXvXB/s600/bg_outside_buildings.jpg", 
        obsSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhN5RYrCOC6hIGxyKnHRuVBk81NV5fMaYmrIvcDgDkGVGggAFjnbwpGbHnSCopeGLzKjf_4AXYL-bKhuQq7qVRyElS_fTkXEN1cxXEqnKzcFEAVHZ5fzlH_-nD0OXitY944hV60jJmTV8mQ/s800/10shinjuku.png" 
    },
    { 
        name: "宇宙", 
        ground: "#483d8b",
        bgSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiHx14z8OPn_FdFm5bNQeukdyVrvYmBWvnEpB4Bq1Z9LQEbrFzhn4BDdjlxp4EbpuyMBBi3ZIQYSpqhrOzKV8AFa1fW_f1JCE3bRVIl4DY45n4tls_LynM1XoZxjWrFhr5SiJZw8iEZRP_J/s600/bg_uchu_space.jpg", 
        obsSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhrtNBtKtHifu7qoZF0bCOQQcCcwqeKYU80Vpv2uEke8UQrbsFOJiXLVfwTQxojH1lgQfqLgYRiIR9v6vhgoHs1IsuDpJvE8GhUtp97Bdg_O8sWszD6fVbOZEQ82UdTfrhoJR5gOCVe67w/s450/space07_saturn.png" 
    },
    { 
        name: "火山", 
        ground: "#8b0000",
        bgSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiegv99eh1H8YR4DoW-JaoLOiF8-QnFjvDy77b-B0Rwax3tRqJz35ixXasm6LAXkNWCGsHXBBMygQYyvMo53kF1fB5sJV7CVpiTd5LABLzVsraQRZuyBw2fq9wDZbtSqFQtKh6uocVuk-Y/s180-c/kagoshima_sakurajima.png", 
        obsSrc: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhsFIHgbPZWCEFBnKQsiKEzU6T_yAGycWdGfW5R3FiOBEnMyWZxbTf5ukepW7MKBtr8R5hTUYHvrBCFIZEBx44MNZ0zalA8ebsfb6-JueRt-bV_xIV0YVKKVXxUaix1hqjw8PAKqy9z6f0/s400/shizensaigai_funka.png" 
    }
];

// 現在のステージ用画像オブジェクト
let currentImgBg = new Image();
let currentImgObs = new Image();

// ゲーム変数
let gameState = "MENU";
let playerName = "Unknown";
let stage = 1;
let score = 0;
let gameSpeed = 5;
let isGameOver = false;

const player = { x: 80, y: 200, w: 70, h: 70, dy: 0, jumpForce: -12, gravity: 0.6, grounded: false };
let obstacles = [];
let goalX = 2000;

function updateRankingUI() {
    const scores = JSON.parse(localStorage.getItem("themeRunnerScores") || "[]");
    rankingList.innerHTML = scores.length ? 
        scores.map((s, i) => `<div>${i+1}. ${s.name} - ${s.score}pt (St.${s.stage})</div>`).join('') :
        "まだ記録がありません";
}
updateRankingUI();

function startGame() {
    playerName = playerNameInput.value.trim() || "名無し";
    document.getElementById("displayLabel").innerText = "PLAYER: " + playerName;
    menu.style.display = "none";
    gameState = "PLAY";
    stage = 1;
    score = 0;
    initStage();
    requestAnimationFrame(gameLoop);
}

function initStage() {
    const theme = themes[(stage - 1) % themes.length];
    document.getElementById("themeName").innerText = theme.name;
    document.getElementById("stage").innerText = stage;
    
    // 画像の切り替え
    currentImgBg.src = theme.bgSrc;
    currentImgObs.src = theme.obsSrc;

    obstacles = [];
    goalX = 1500 + (stage * 800);
    gameSpeed = 5 + (stage * 1.0);
    
    for (let i = 500; i < goalX - 300; i += 350 + Math.random() * 300) {
        obstacles.push({ x: i, w: 80, h: 80 }); // 障害物サイズを固定（画像に合わせて調整）
    }
    player.x = 80;
    isGameOver = false;
}

function saveScore() {
    let scores = JSON.parse(localStorage.getItem("themeRunnerScores") || "[]");
    scores.push({ name: playerName, score: Math.floor(score), stage: stage });
    scores.sort((a, b) => b.score - a.score);
    localStorage.setItem("themeRunnerScores", JSON.stringify(scores.slice(0, 5)));
    updateRankingUI();
}

function jump() {
    if (gameState === "PLAY" && player.grounded && !isGameOver) {
        player.dy = player.jumpForce;
        player.grounded = false;
    }
}

window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
canvas.addEventListener("mousedown", jump);

function update() {
    if (isGameOver || gameState !== "PLAY") return;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y + player.h > canvas.height - 30) {
        player.y = canvas.height - 30 - player.h;
        player.dy = 0;
        player.grounded = true;
    }

    player.x += gameSpeed;
    score += 0.1;
    document.getElementById("score").innerText = Math.floor(score);

    obstacles.forEach(ob => {
        if (player.x < ob.x + ob.w && player.x + player.w > ob.x &&
            player.y + player.h > canvas.height - 30 - ob.h) {
            handleGameOver();
        }
    });

    if (player.x > goalX) {
        stage++;
        initStage();
    }
}

function handleGameOver() {
    isGameOver = true;
    saveScore();
    menuTitle.innerText = "GAME OVER";
    menuTitle.style.color = "#f33";
    document.getElementById("menuMsg").innerText = `最終スコア: ${Math.floor(score)}pt`;
    menu.style.display = "block";
    gameState = "MENU";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const theme = themes[(stage - 1) % themes.length];

    // 背景画像（全画面）
    if (currentImgBg.complete) {
        ctx.drawImage(currentImgBg, 0, 0, canvas.width, canvas.height);
    }

    ctx.save();
    ctx.translate(-player.x + 100, 0);

    // 地面（テーマごとの色）
    ctx.fillStyle = theme.ground;
    ctx.fillRect(player.x - 100, canvas.height - 30, canvas.width + 100, 30);

    // 障害物（テーマごとの画像）
    obstacles.forEach(ob => {
        if (currentImgObs.complete) {
            ctx.drawImage(currentImgObs, ob.x, canvas.height - 30 - ob.h, ob.w, ob.h);
        }
    });

    // ゴール
    ctx.fillStyle = "white";
    ctx.fillRect(goalX, 0, 5, canvas.height);

    // プレイヤー画像
    if (imgPlayer.complete) {
        ctx.drawImage(imgPlayer, player.x, player.y, player.w, player.h);
    }
    
    ctx.fillStyle = "white";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(playerName, player.x + player.w/2, player.y - 10);

    ctx.restore();
}

function gameLoop() {
    if (gameState === "PLAY") {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }
}
</script>
</body>
</html>
